<!DOCTYPE html>
<html>
<head>
    <title>Movie Search</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        input {
            padding: 8px;
            width: 300px;
        }
        button {
            padding: 8px 12px;
        }
        table {
            margin-top: 20px;
            border-collapse: collapse;
            width: 80%;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

    <h2>🎬 Movie Search</h2>

    <input type="text" id="movieInput" placeholder="Enter movie title">
    <button onclick="searchMovie()">Search</button>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>Movie</th>
                <th>Cast</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        async function searchMovie() {
            const title = document.getElementById("movieInput").value;

            if (!title) {
                alert("Please enter a movie name");
                return;
            }

            const response = await fetch(`/search?title=${encodeURIComponent(title)}`);
            const data = await response.json();

            const table = document.getElementById("resultTable");
            const tbody = table.querySelector("tbody");

            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = "<tr><td colspan='2'>No results found</td></tr>";
            } else {
                data.forEach(item => {
                    const row = `
                        <tr>
                            <td>${item.movie}</td>
                            <td>${item.cast.join(", ")}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }

            table.style.display = "table";
        }
    </script>

</body>
</html>
