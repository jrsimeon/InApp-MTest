<!DOCTYPE html>
<html>
<head>
    <title>Movie Search UI</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
        }
        input, select, button {
            padding: 8px;
            margin: 5px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            background: white;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
        }
        th {
            background: #333;
            color: white;
        }
    </style>
</head>

<body>

<h2>🎬 Search Dashboard</h2>



<!-- 🔍 Search Filters -->
<input type="text" id="name" placeholder="Name">
<input type="text" id="movie" placeholder="Movie Title">
<select id="profession">
    <option value="">All Professions</option>
    <option value="actor">Actor</option>
    <option value="director">Director</option>
    <option value="writer">Writer</option>
</select>

<!-- API selector -->
<select id="apiType">
    <option value="person">Person API</option>
    <option value="movie">Movie API</option>
</select>

<button onclick="search()">Search</button> <a href="/auth/logout" align="right">Logout</a>

<div id="loader" style="display:none; text-align:center; margin-top:20px;">
    <img src="https://i.gifer.com/ZZ5H.gif" width="60" alt="Loading..." />
    <p>Loading...</p>
</div>

<!-- 📊 Results -->
<table id="resultTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Birth Year</th>
            <th>Profession</th>
            <th>Known Titles</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
async function search() {
    const name = document.getElementById("name").value;
    const movie = document.getElementById("movie").value;
    const profession = document.getElementById("profession").value;
    const apiType = document.getElementById("apiType").value;

    let url = "";

    // 🔀 Switch between APIs
    if (apiType === "person") {
        url = `/personsearch?name=${name}&movie=${movie}&profession=${profession}`;
    } else {
        url = `/moviesearch?name=${name}&movie=${movie}`;
    }
    const loader = document.getElementById("loader");
    loader.style.display = "block";
    try {
        const res = await fetch(url);
        const data = await res.json();

        
        const tbody = document.querySelector("#resultTable tbody");

        
        tbody.innerHTML = "";

        data.forEach(item => {
            const row = `
                <tr>
                    <td>${item.Name || item.title}</td>
                    <td>${item["Birth Year"] || "-"}</td>
                    <td>${(item.Profession || []).join(", ")}</td>
                    <td>${(item["Known for Titles"] || []).join(", ")}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

    } catch (err) {
        alert("Error fetching data");
        alert(err);
    }
    finally {
        // ✅ Hide loader after response
        loader.style.display = "none";
    }
}
</script>

</body>
</html>
